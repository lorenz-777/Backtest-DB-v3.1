# ─────────────────────────────────────────────────────────────────────────────
# scrape.yml  –  Parallel Scraper für 5900 Ticker
#
# Ablauf:
#   1. split-tickers   – teilt tickers.txt in N Batches auf, legt Artefakt an
#   2. scrape (Matrix) – N Jobs laufen parallel, jeder scrapt seinen Batch
#   3. merge-db        – alle Teil-DBs werden zusammengeführt
#
# Trigger: täglich 02:00 UTC  |  manuell (workflow_dispatch mit Optionen)
# ─────────────────────────────────────────────────────────────────────────────

name: Scrape Fundamentals

on:
  schedule:
    - cron: "0 2 * * *"          # täglich 02:00 UTC
  workflow_dispatch:
    inputs:
      num_batches:
        description: "Anzahl paralleler Batches (1-256)"
        required: false
        default: "20"
      delay:
        description: "Pause zwischen Tickern in Sekunden"
        required: false
        default: "2.0"
      tickers_override:
        description: "Nur diese Ticker scrapen (komma-getrennt, leer = tickers.txt)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"
  DEFAULT_BATCHES: "20"
  DEFAULT_DELAY:   "2.0"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: tickers.txt → N Batch-Dateien
  # ════════════════════════════════════════════════════════════════════════════
  split-tickers:
    name: Split Tickers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      num_batches: ${{ steps.split.outputs.num_batches }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Split tickers into batches
        id: split
        run: |
          python scripts/split_tickers.py \
            --tickers    "${TICKERS_OVERRIDE:-tickers.txt}" \
            --num-batches "${NUM_BATCHES}" \
            --output-dir  batch_inputs
        env:
          NUM_BATCHES:       ${{ github.event.inputs.num_batches || env.DEFAULT_BATCHES }}
          TICKERS_OVERRIDE:  ${{ github.event.inputs.tickers_override }}

      - name: Upload batch files
        uses: actions/upload-artifact@v4
        with:
          name: batch-inputs
          path: batch_inputs/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Matrix – jeder Batch läuft parallel
  # ════════════════════════════════════════════════════════════════════════════
  scrape:
    name: "Scrape Batch ${{ matrix.batch_id }}"
    needs: split-tickers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false           # Fehler in einem Batch stoppen nicht die anderen
      max-parallel: 20           # GitHub Free: 20 gleichzeitige Jobs
      matrix:
        batch_id: ${{ fromJson(needs.split-tickers.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download batch inputs
        uses: actions/download-artifact@v4
        with:
          name: batch-inputs
          path: batch_inputs/

      - name: Run scraper for batch ${{ matrix.batch_id }}
        run: |
          python scripts/run_batch.py \
            --batch-file  "batch_inputs/batch_${{ matrix.batch_id }}.txt" \
            --db          "db_batch_${{ matrix.batch_id }}.db" \
            --delay       "${DELAY}"
        env:
          DELAY: ${{ github.event.inputs.delay || env.DEFAULT_DELAY }}
        timeout-minutes: 340     # knapp unter 6h GitHub-Limit

      - name: Upload partial DB
        if: always()             # auch bei Fehlern hochladen (Partial-Results)
        uses: actions/upload-artifact@v4
        with:
          name: "db-batch-${{ matrix.batch_id }}"
          path: "db_batch_${{ matrix.batch_id }}.db"
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Teil-DBs zusammenführen + in Repo committen
  # ════════════════════════════════════════════════════════════════════════════
  merge-db:
    name: Merge & Commit DB
    needs: scrape
    runs-on: ubuntu-latest
    if: always()                 # auch wenn manche Batches fehlschlugen

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all partial DBs
        uses: actions/download-artifact@v4
        with:
          pattern: db-batch-*
          path: db_parts/
          merge-multiple: true

      - name: Download existing DB (if any)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: full-db-latest
          path: .

      - name: Merge all partial DBs
        run: |
          python scripts/merge_dbs.py \
            --parts-dir  db_parts/ \
            --output     data.db

      - name: Show DB stats
        run: python db.py --status

      - name: Upload merged DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-db-latest
          path: data.db
          retention-days: 30

      - name: Commit DB to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.db
          git diff --staged --quiet || \
            git commit -m "chore: update data.db [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
